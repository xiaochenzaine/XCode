name: Build XCode APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK & NDK
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;3.31.5" \
            2>&1
      - name: Grant Permission
        run: chmod +x gradlew
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCode-Release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: XCode-Release
      - name: Get Version
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H%M')" >> $GITHUB_OUTPUT
          echo "tag=v$(date +'%Y%m%d.%H%M')" >> $GITHUB_OUTPUT
      - name: Rename APK
        run: mv app-release.apk XCode-${{ steps.version.outputs.date }}.apk 2>/dev/null || true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: XCode Build ${{ steps.version.outputs.date }}
          body: |
            ## XCode 自动构建发行包
            ### 构建信息
            - 版本: ${{ steps.version.outputs.date }}.${{ steps.version.outputs.time }}
            - 提交: ${{ github.sha }}
            ### 更新内容
            - 基于 xiaochenzaine/XCode 最新源码
            - 修复 clangd VFS build dir 报错
            - Release APK (arm64-v8a)
            ### 安装要求
            - Android 8.0+ (API 26+)
            - arm64-v8a 架构
          files: XCode-*.apk
          draft: false
          prerelease: false